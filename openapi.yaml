openapi: 3.1.0
info:
  title: ComfySkill Platform API
  version: 0.1.0
  description: Contract for public frontend ↔ private platform API (Milestone 0)
  contact:
    name: Kelly Yang
    email: 124ykl@gmail.com

servers:
  - url: http://localhost:8000
    description: Local
  - url: https://api-staging.comfyskill.com
    description: Staging (TBD)

paths:
  /health:
    get:
      summary: Health check
      responses:
        "200":
          description: OK

  /auth/register:
    post:
      summary: Register new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "200":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"

  /auth/login:
    post:
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: JWT token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"

  /me:
    get:
      summary: Current user
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"

  /jobs:
    get:
      summary: List my jobs
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobListResponse"
    post:
      summary: Create text2img job
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateJobRequest"
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateJobResponse"
        "402":
          description: Insufficient credits

  /projects:
    get:
      summary: List my studio canvas projects
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Project summaries
    post:
      summary: Create empty studio project
      security: [{ bearerAuth: [] }]
      responses:
        "201":
          description: Created project

  /projects/{project_id}:
    get:
      summary: Get project with blocks and edges
      security: [{ bearerAuth: [] }]
      parameters:
        - name: project_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Full project graph
    put:
      summary: Replace project graph (title, viewport, blocks, edges)
      security: [{ bearerAuth: [] }]
      parameters:
        - name: project_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Updated project
    delete:
      summary: Delete project
      security: [{ bearerAuth: [] }]
      parameters:
        - name: project_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204":
          description: Deleted

  /jobs/{job_id}:
    get:
      summary: Get job status
      security: [{ bearerAuth: [] }]
      parameters:
        - name: job_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobResponse"

  /jobs/{job_id}/events:
    get:
      summary: List job timeline events
      security: [{ bearerAuth: [] }]
      parameters:
        - name: job_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                required: [job_id, events, total]
                properties:
                  job_id: { type: string, format: uuid }
                  total: { type: integer }
                  events:
                    type: array
                    items:
                      type: object
                      required: [id, event_type, created_at]
                      properties:
                        id: { type: string, format: uuid }
                        event_type: { type: string }
                        payload: { type: object, nullable: true }
                        created_at: { type: string, format: date-time }

  /billing/balance:
    get:
      summary: Credit balance
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  balance_credits: { type: integer }

  /billing/transactions:
    get:
      summary: Credit transaction ledger
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionListResponse"

  /billing/stripe/status:
    get:
      summary: Stripe checkout readiness
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StripeStatusResponse"

  /billing/checkout:
    post:
      summary: Create Stripe Checkout session
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Checkout URL

  /billing/checkout/embedded:
    post:
      summary: Create Stripe Embedded Checkout session
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Client secret

  /billing/portal:
    post:
      summary: Create Stripe billing portal session
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Portal URL

  /admin/jobs:
    get:
      summary: List all jobs (admin)
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobListResponse"
        "403":
          description: Forbidden

  /admin/users:
    get:
      summary: List users (admin)
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUsersResponse"
        "403":
          description: Forbidden

  /admin/users/{user_id}/credits:
    post:
      summary: Grant credits to a user (admin)
      security: [{ bearerAuth: [] }]
      parameters:
        - name: user_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminGrantCreditsRequest"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUserResponse"
        "403":
          description: Forbidden

  /admin/metrics:
    get:
      summary: Platform metrics (admin)
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminMetricsResponse"
        "403":
          description: Forbidden

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    RegisterRequest:
      type: object
      required: [email, password, name]
      properties:
        email: { type: string, format: email }
        password: { type: string, minLength: 8 }
        name: { type: string }

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string }

    TokenResponse:
      type: object
      properties:
        access_token: { type: string }
        token_type: { type: string, default: bearer }

    UserResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        email: { type: string }
        name: { type: string }
        role: { type: string, enum: [admin, tester, user] }
        balance_credits: { type: integer }

    CreateJobRequest:
      type: object
      required: [prompt]
      properties:
        prompt: { type: string, maxLength: 4000 }
        quality_tier:
          type: string
          enum: [premium, standard, budget]
          default: standard
        project_id: { type: string, format: uuid, nullable: true }
        block_id: { type: string, format: uuid, nullable: true }

    JobResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        capability: { type: string }
        prompt_text: { type: string }
        quality_tier: { type: string }
        status: { type: string }
        model_preset: { type: string, nullable: true }
        credits_estimated: { type: integer }
        credits_charged: { type: integer, nullable: true }
        output_url: { type: string, nullable: true }
        error_message: { type: string, nullable: true }
        created_at: { type: string, format: date-time }
        completed_at: { type: string, format: date-time, nullable: true }
        project_id: { type: string, format: uuid, nullable: true }
        block_id: { type: string, format: uuid, nullable: true }

    CreateJobResponse:
      type: object
      properties:
        job: { $ref: "#/components/schemas/JobResponse" }
        credits_estimate: { type: integer }

    JobListResponse:
      type: object
      properties:
        jobs:
          type: array
          items: { $ref: "#/components/schemas/JobResponse" }
        total: { type: integer }

    TransactionResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        amount: { type: integer }
        type: { type: string }
        description: { type: string, nullable: true }
        job_id: { type: string, format: uuid, nullable: true }
        created_at: { type: string, format: date-time }

    TransactionListResponse:
      type: object
      properties:
        transactions:
          type: array
          items: { $ref: "#/components/schemas/TransactionResponse" }

    StripeStatusResponse:
      type: object
      properties:
        configured: { type: boolean }
        price_configured: { type: boolean }
        price_looks_valid: { type: boolean }
        mode: { type: string }
        plans:
          type: object
          additionalProperties: { type: boolean }

    AdminGrantCreditsRequest:
      type: object
      required: [amount]
      properties:
        amount: { type: integer, minimum: 1 }
        description: { type: string, nullable: true }

    AdminUserResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        email: { type: string }
        name: { type: string }
        role: { type: string, enum: [admin, tester, user] }
        balance_credits: { type: integer }
        created_at: { type: string, format: date-time }

    AdminUsersResponse:
      type: object
      properties:
        users:
          type: array
          items: { $ref: "#/components/schemas/AdminUserResponse" }

    AdminMetricsResponse:
      type: object
      properties:
        total_jobs: { type: integer }
        completed_jobs: { type: integer }
        failed_jobs: { type: integer }
        credits_consumed_today: { type: integer }
        active_users: { type: integer }
